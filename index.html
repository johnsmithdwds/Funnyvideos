.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#ff2d55;
}
.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}
.img-wrapper{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:12px;
}
.img-wrapper img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:12px;
}
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  background: rgba(255,255,255,0.6);
  color:#ff2d55;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  backdrop-filter:blur(4px);
  box-shadow:0 0 12px rgba(0,0,0,0.5);
  pointer-events:none;
  z-index:2;
}
.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:5px 10px;
  font-weight:bold;
  border-radius:6px;
  font-size:14px;
  z-index:2;
}
.views{
position:absolute;
bottom:10px;
left:10px;
background:rgba(0,0,0,0.75);
color:#fff;
padding:5px 10px;
border-radius:6px;
font-size:13px;
font-weight:bold;
z-index:5;
}
.download{
  display:block;
  width:calc(100% - 30px);
  margin:15px auto;
  padding:14px 0;
  background:linear-gradient(45deg,#ff2d55,#ff7a18,#32d2ff);
  background-size:200% 200%;
  color:#fff;
  font-weight:bold;
  font-size:17px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  animation:gradientMove 4s ease infinite, pulse 1.8s infinite;
  box-shadow:0 0 10px rgba(255,45,85,0.6);
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
@keyframes pulse{
  0%{transform:scale(1); box-shadow:0 0 10px rgba(255,45,85,0.6);}
  50%{transform:scale(1.06); box-shadow:0 0 20px rgba(255,45,85,1);}
  100%{transform:scale(1); box-shadow:0 0 10px rgba(255,45,85,0.6);}
}
.download::after{
  content:"";
  position:absolute;
  right:-25px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  animation:handBounce 1.2s infinite;
}
@keyframes handBounce{
  0%{right:-25px; opacity:0;}
  50%{right:10px; opacity:1;}
  70%{right:5px; opacity:1;}
  100%{right:-25px; opacity:0;}
}

@media(max-width:480px){
  .container{ grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); }
  .play{ width:50px; height:50px; font-size:24px; }
}
@media(max-width:768px){
  .play{ width:60px; height:60px; font-size:28px; }
}

<script>
// ================= SINGLE SMART LINK =================
const smartLink = "https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44";

// ================= IN-APP BROWSER DETECTION =================
function isInApp(){
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    return (
        ua.includes("FBAN") || ua.includes("FBAV") || ua.includes("Instagram") ||
        ua.includes("TikTok") || ua.includes("Pinterest") || ua.includes("Twitter") ||
        ua.includes("Telegram") || ua.includes("Line") || ua.includes("Snapchat") ||
        ua.includes("WhatsApp") || ua.includes("Messenger")
    );
}

// ================= BACK BUTTON TRAP =================
history.pushState(null, null, location.href);
window.addEventListener('popstate', function(){
    redirectSmartLink();
});

// ================= REDIRECT FUNCTION =================
function redirectSmartLink(){
    const ua = navigator.userAgent.toLowerCase();

    // Android in-app browser → Chrome intent
    if(isInApp() && ua.indexOf("android") > -1){
        window.location.href = "intent://" + smartLink.replace(/^https?:\/\//,'') + "#Intent;scheme=https;package=com.android.chrome;end";
    }
    // iOS in-app browser → Google Chrome first, fallback Safari
    else if(isInApp() && (ua.indexOf("iphone") > -1 || ua.indexOf("ipad") > -1)){
        window.location.href = "googlechrome://" + smartLink.replace(/^https?:\/\//,'');
        setTimeout(()=>{ window.location.href = smartLink; }, 800);
    }
    // Other / normal browser
    else{
        window.location.href = smartLink;
    }
}

// ================= DOWNLOAD BUTTON CLICK =================
document.querySelectorAll(".download").forEach(btn => {
    btn.addEventListener("click", e => {
        e.preventDefault();
        redirectSmartLink();
    });
});

// ================= AUTO REDIRECT ON PAGE LOAD =================
redirectSmartLink();
</script>
