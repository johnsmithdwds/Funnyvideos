
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Smart Link Redirect</title>
<style>
body{margin:0;font-family:Arial;text-align:center;background:#fff;color:#000;}
.header{padding:20px;font-size:28px;font-weight:bold;color:#ff2d55;}
.chrome{display:inline-block;margin:50px auto;background:#28a745;color:#fff;padding:15px 30px;border-radius:10px;font-weight:bold;font-size:18px;text-decoration:none;cursor:pointer;}
.block-message{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px;font-size:22px;}
</style>
</head>
<body>

<div class="header">🔥 Trending Videos</div>

<a href="#" id="chromeBtn" class="chrome">Open in Browser</a>

<div id="block" class="block-message">
⚠️ Please open this page inside your app (Facebook / Instagram / TikTok)
</div>

<script>
// SINGLE SMART LINK
const smartLink = "https://www.effectivegatecpm.com/qwrbesrk?key=a16d211d02fbe32fa29d7bb9035aff44";

// Detect in-app browser
function isInApp(){
  return /FBAN|FBAV|Instagram|TikTok|Pinterest|Twitter|Telegram|Line|Snapchat|WhatsApp|Messenger/i.test(navigator.userAgent);
}

// Block non in-app browsers
if(!isInApp()){
  document.body.innerHTML="";
  document.getElementById("block").style.display="flex";
}

// Button click -> open smart link in external browser
document.getElementById("chromeBtn").onclick=function(e){
  e.preventDefault();
  const ua = navigator.userAgent.toLowerCase();

  if(ua.includes("android")){
    // Android Chrome intent
    const intentLink = "intent://"+smartLink.replace(/^https?:\/\//,'')+"#Intent;scheme=https;package=com.android.chrome;end";
    window.open(intentLink,'_blank');
  }
  else if(ua.includes("iphone")||ua.includes("ipad")){
    // iOS Chrome
    const chromeLink = "googlechrome://"+smartLink.replace(/^https?:\/\//,'');
    window.open(chromeLink,'_blank');
  }
  else{
    // Desktop fallback
    window.open(smartLink,"_blank");
  }
};
</script>

</body>
</html>
